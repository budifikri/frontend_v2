<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Warehouse Management - Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#0D9488", // Teal 600
                        "background-light": "#F3F4F6", // Gray 100
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .glossy-header {
            background: linear-gradient(180deg, #374151 0%, #1F2937 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-background-light text-slate-900 min-h-screen p-6">
<div class="max-w-6xl mx-auto space-y-6">
<header class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-1.5 h-8 bg-primary rounded-full"></div>
<h1 class="text-2xl font-bold tracking-tight uppercase text-slate-800" style="">Daftar Gudang</h1>
</div>
</header>
<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[500px]">
<div class="overflow-x-auto custom-scrollbar">
<table class="w-full text-left border-collapse">
<thead>
<tr class="glossy-header text-white text-sm uppercase tracking-wider font-semibold">
<th class="px-6 py-4 border-r border-slate-600/30 w-20" style="">
<div class="flex items-center gap-2" style="">
                                    NO
                                    <span class="material-icons-round text-xs opacity-50" style="">unfold_more</span>
</div>
</th>
<th class="px-6 py-4 border-r border-slate-600/30 w-32" style="">
<div class="flex items-center gap-2" style="">
                                    KODE
                                    <span class="material-icons-round text-xs text-primary" style="">expand_more</span>
</div>
</th>
<th class="px-6 py-4" style="">
<div class="flex items-center gap-2" style="">
                                    NAMA
                                    <span class="material-icons-round text-xs opacity-50" style="">unfold_more</span>
</div>
</th>
</tr>
</thead>
<tbody class="text-sm font-medium">
<tr class="bg-white border-b border-slate-100 hover:bg-slate-50 transition-colors">
<td class="px-6 py-4 text-slate-500" style="">1</td>
<td class="px-6 py-4 text-slate-700" style="">1</td>
<td class="px-6 py-4 text-slate-700" style="">CANTIK</td>
</tr>
<tr class="bg-primary text-white shadow-inner">
<td class="px-6 py-4" style="">2</td>
<td class="px-6 py-4" style="">123</td>
<td class="px-6 py-4" style="">GUDANG UTAMA JAKARTA</td>
</tr>
<tr class="bg-slate-50 border-b border-slate-100 hover:bg-slate-100 transition-colors">
<td class="px-6 py-4 text-slate-500" style="">3</td>
<td class="px-6 py-4 text-slate-700" style="">2</td>
<td class="px-6 py-4 text-slate-700" style="">OLYMPIC21</td>
</tr>
<tr class="bg-white border-b border-slate-100 hover:bg-slate-50 transition-colors">
<td class="px-6 py-4 text-slate-500" style="">4</td>
<td class="px-6 py-4 text-slate-700" style="">3</td>
<td class="px-6 py-4 text-slate-700" style="">GUDANG RUMAH</td>
</tr>
<tr class="bg-slate-50 border-b border-slate-100 hover:bg-slate-100 transition-colors">
<td class="px-6 py-4 text-slate-500" style="">5</td>
<td class="px-6 py-4 text-slate-700" style="">4</td>
<td class="px-6 py-4 text-slate-700" style="">BANG AMIR</td>
</tr>
<tr class="bg-white border-b border-slate-100 hover:bg-slate-50 transition-colors">
<td class="px-6 py-4 text-slate-500" style="">6</td>
<td class="px-6 py-4 text-slate-700" style="">5</td>
<td class="px-6 py-4 text-slate-700" style="">BUSA BANG AMIR</td>
</tr>
</tbody>
</table>
</div>
<div class="flex-grow"></div>
</div>
<div class="bg-white rounded-xl shadow-lg border-2 border-primary/20 p-6">
<div class="flex items-center gap-2 mb-6">
<span class="material-icons-round text-primary" style="">inventory</span>
<h2 class="text-lg font-bold text-slate-800" style="">Isi Data Gudang</h2>
</div>
<form class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
<div class="md:col-span-2 space-y-2">
<label class="block text-sm font-semibold text-slate-600" for="kode" style="">Kode :</label>
<input class="w-full bg-slate-50 border-slate-200 rounded-lg focus:ring-primary focus:border-primary text-slate-700" id="kode" type="text" value="...">
</div>
<div class="md:col-span-8 space-y-2">
<label class="block text-sm font-semibold text-slate-600" for="nama" style="">Nama :</label>
<input class="w-full bg-slate-50 border-slate-200 rounded-lg focus:ring-primary focus:border-primary text-slate-700" id="nama" placeholder="Masukkan nama gudang..." type="text">
</div>
<div class="md:col-span-2">
<button class="w-full bg-primary hover:bg-teal-700 text-white font-bold py-2.5 px-6 rounded-lg transition-all transform active:scale-95 shadow-md flex items-center justify-center gap-2 uppercase tracking-wide" type="submit" style="">
<span class="material-icons-round text-lg" style="">save</span>
                        Simpan
                    </button>
</div>
</form>
</div>
<footer class="flex justify-between items-center text-[10px] uppercase tracking-widest text-slate-400 px-2">
<div class="" style=""><br></div>
<div class="flex gap-4">
<span class="flex items-center gap-1" style=""><span class="w-2 h-2 rounded-full bg-green-500"><br></span></span>
<span class="" style=""><br></span>
</div>
</footer>
</div>

</body></html>
